services:
  backend:
    image: maven:3-eclipse-temurin-17
    working_dir: /app
    volumes:
      - .:/app
      - maven-repo:/root/.m2
    ports:
      - "8080:8080"
    command: ./mvnw spring-boot:run -pl workday-application -am -Pdevelop -Dspring-boot.run.profiles=develop
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:8080
    command: sh -c "npm ci && npx vite --host 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy

  playwright:
    image: mcr.microsoft.com/playwright:v1.57.0-noble
    working_dir: /app
    volumes:
      - .:/app
      - playwright-node-modules:/app/node_modules
    environment:
      - BASE_URL=http://frontend:3000
      - SKIP_WEB_SERVER=true
      - CI=true
    command: sh -c "npm ci && npx playwright test"
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  maven-repo:
  frontend-node-modules:
  playwright-node-modules:
