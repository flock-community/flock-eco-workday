name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04

    # Add "id-token" with the intended permissions.
    permissions:
      contents: "write"
      id-token: "write"
      pull-requests: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: "auth"
        name: "Authenticate to Google Cloud"
        if: github.actor != 'dependabot[bot]'
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDED }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud environment
        if: github.actor != 'dependabot[bot]'
        uses: google-github-actions/setup-gcloud@v2

      - name: Google cloud info
        if: github.actor != 'dependabot[bot]'
        run: gcloud info

      - name: Setup docker
        if: github.actor != 'dependabot[bot]'
        run: gcloud auth configure-docker

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - run: npm ci
      - name: Biome
        run: npm run lint

      - name: Run npm tests
        run: npm test

      - name: Full build
        run: ./mvnw -B package

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx -y playwright install chromium --with-deps

      - name: Start backend server in background
        run: |
          echo "Starting backend server..."
          # Use develop profile with ci addon (Google Drive integration disabled)
          ./mvnw -B compile spring-boot:run -DskipTests -Dspring-boot.run.profiles=develop,ci -Pdevelop > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend server started with PID $(cat backend.pid)"

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend to start..."
          # First check if the port is open
          timeout 300 bash -c 'until nc -z localhost 8080; do sleep 2; done'
          echo "Backend port is open"
          # Then check if health endpoint is available (fallback to basic port check)
          timeout 60 bash -c 'until curl -s -f http://localhost:8080/actuator/health > /dev/null || curl -s -f http://localhost:8080 > /dev/null; do sleep 2; done'
          echo "Backend is ready!"

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "=== Backend Server Logs ==="
          if [ -f backend.log ]; then
            tail -100 backend.log
          else
            echo "No backend.log file found"
          fi

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            backend.log
          retention-days: 30

      - name: Determine Playwright Pages target directory
        if: always() && github.actor != 'dependabot[bot]'
        id: pages-target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "label=PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})" >> "$GITHUB_OUTPUT"
          else
            echo "dir=main" >> "$GITHUB_OUTPUT"
            echo "label=main @ ${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Playwright report to GitHub Pages
        if: always() && github.actor != 'dependabot[bot]' && hashFiles('playwright-report/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./playwright-report
          destination_dir: ${{ steps.pages-target.outputs.dir }}
          keep_files: true
          commit_message: "Publish Playwright report for ${{ steps.pages-target.outputs.label }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Comment Playwright report link on PR
        if: always() && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && hashFiles('playwright-report/index.html') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const dir = `pr-${context.issue.number}`;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/${dir}/`;
            const marker = '<!-- playwright-report-link -->';
            const body = `${marker}\n### Playwright report\n\nDashboard (with videos) for this PR: ${url}\n\nLatest run: ${context.sha.substring(0, 7)}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
            rm backend.pid
          fi
          if [ -f backend.log ]; then
            rm backend.log
          fi

      - name: Build and Deploy
        if: github.actor != 'dependabot[bot]' && github.ref_name == github.event.repository.default_branch
        run: ./mvnw -B clean package jib:build -DskipTests -Pfrontend -Dnpm.ci.skip -Djib.to.image=eu.gcr.io/flock-community/flock-eco-workday -Djib.to.tags=${{ github.sha }} --file pom.xml

      - name: Build and Deploy Development version
        if: github.actor != 'dependabot[bot]'
        run: ./mvnw -B package jib:build -DskipTests -Pdevelop,frontend -Dnpm.ci.skip -Dnpm.skip -Djib.container.environment=SPRING_PROFILES_ACTIVE=develop -Djib.to.image=eu.gcr.io/flock-community/flock-eco-workday-develop -Djib.to.tags=${{ github.sha }} --file pom.xml
